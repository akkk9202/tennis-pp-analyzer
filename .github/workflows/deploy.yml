name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Required for OIDC-based GitHub Pages deployment (no PAT needed)
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments (second run waits for first)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Tests must pass before we build or deploy
      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build
        # If your repo is named something other than tennis-pp-analyzer,
        # set VITE_BASE_URL here to match. Example:
        # env:
        #   VITE_BASE_URL: /my-repo-name/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
